name: Publish to npm & GitHub Release

on:
  push:
    branches: [main]

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - run: sudo apt-get update && sudo apt-get install -y libsecret-1-dev

      - run: npm ci

      - run: npm test

      - run: npm run build

      - name: Determine version bump from commit
        id: bump
        run: |
          MSG=$(git log -1 --pretty=%B)
          if echo "$MSG" | grep -qiE '^feat(\(.+\))?!:|BREAKING CHANGE'; then
            echo "type=major" >> "$GITHUB_OUTPUT"
          elif echo "$MSG" | grep -qiE '^feat(\(.+\))?:'; then
            echo "type=minor" >> "$GITHUB_OUTPUT"
          else
            echo "type=patch" >> "$GITHUB_OUTPUT"
          fi

      - name: Bump version
        id: version
        run: |
          npm version ${{ steps.bump.outputs.type }} --no-git-tag-version
          VERSION=$(node -p 'require("./package.json").version')
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Commit version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json package-lock.json
          git commit -m "chore: bump version to $VERSION"
          git push

  build-mcpb:
    needs: publish
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
            setup: sudo apt-get update && sudo apt-get install -y libsecret-1-dev
          - os: macos-latest
            platform: darwin
            setup: echo "no setup needed"
          - os: windows-latest
            platform: win32
            setup: echo "no setup needed"
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Platform setup
        run: ${{ matrix.setup }}

      - run: npm ci

      - run: npm run build

      - name: Update manifest version
        shell: bash
        run: |
          VERSION="${{ needs.publish.outputs.version }}"
          node -e "
            const fs = require('fs');
            const m = JSON.parse(fs.readFileSync('manifest.json', 'utf8'));
            m.version = '$VERSION';
            fs.writeFileSync('manifest.json', JSON.stringify(m, null, 2) + '\n');
          "

      - name: Build .mcpb
        shell: bash
        run: |
          npx @anthropic-ai/mcpb pack .
          MCPB_FILE=$(ls *.mcpb)
          PLATFORM_NAME="vairix-admin-${{ needs.publish.outputs.version }}-${{ matrix.platform }}.mcpb"
          mv "$MCPB_FILE" "$PLATFORM_NAME"
          echo "MCPB_FILE=$PLATFORM_NAME" >> "$GITHUB_ENV"

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.publish.outputs.version }}
          name: Vairix Admin MCP v${{ needs.publish.outputs.version }}
          generate_release_notes: true
          files: ${{ env.MCPB_FILE }}
