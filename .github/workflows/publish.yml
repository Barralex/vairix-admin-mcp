name: Publish to npm & GitHub Release

on:
  push:
    branches: [main]

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - run: sudo apt-get update && sudo apt-get install -y libsecret-1-dev

      - run: npm ci

      - run: npm test

      - run: npm run build

      - name: Determine version bump from commit
        id: bump
        run: |
          MSG=$(git log -1 --pretty=%B)
          if echo "$MSG" | grep -qiE '^feat(\(.+\))?!:|BREAKING CHANGE'; then
            echo "type=major" >> "$GITHUB_OUTPUT"
          elif echo "$MSG" | grep -qiE '^feat(\(.+\))?:'; then
            echo "type=minor" >> "$GITHUB_OUTPUT"
          else
            echo "type=patch" >> "$GITHUB_OUTPUT"
          fi

      - name: Bump version
        run: |
          npm version ${{ steps.bump.outputs.type }} --no-git-tag-version
          echo "VERSION=$(node -p 'require("./package.json").version')" >> "$GITHUB_ENV"

      - run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Commit version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json package-lock.json
          git commit -m "chore: bump version to $VERSION"
          git push

      - name: Update manifest version
        run: |
          jq --arg v "$VERSION" '.version = $v' manifest.json > tmp.json
          mv tmp.json manifest.json

      - name: Build .mcpb
        run: |
          npm install --production --ignore-scripts
          npx @anthropic-ai/mcpb pack .
          echo "MCPB_FILE=$(ls *.mcpb)" >> "$GITHUB_ENV"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.VERSION }}
          name: Vairix Admin MCP v${{ env.VERSION }}
          generate_release_notes: true
          files: ${{ env.MCPB_FILE }}
